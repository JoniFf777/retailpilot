services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: retailpilot-postgres
    environment:
      POSTGRES_DB: retailpilot
      POSTGRES_USER: retailpilot
      POSTGRES_PASSWORD: retailpilot
    ports:
      - "5432:5432"
    volumes:
      - retailpilot-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retailpilot -d retailpilot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  retailpilot-postgres-data:
