name: PostgreSQL Integration

on:
  workflow_dispatch:
    inputs:
      include_tools:
        description: "Run smoke check with LangChain tool calls"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  postgres-integration:
    name: PostgreSQL + pgvector integration
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: retailpilot_v2_smoke
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d retailpilot_v2_smoke"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/retailpilot_v2_smoke?connect_timeout=5
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/retailpilot_v2_smoke_test?connect_timeout=5
      EMBEDDING_PROVIDER: huggingface
      VECTOR_DIMENSION: "768"
      LANGSMITH_TRACING: "false"
      WORKSHOP_MODEL: anthropic:claude-haiku-4-5
      RUN_POSTGRES_INTEGRATION: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-all-mpnet-base-v2-${{ runner.os }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest httpx

      - name: Apply database migrations
        run: python -m alembic upgrade head

      - name: Seed structured data
        run: python scripts/seed_postgres.py --clear

      - name: Index documents into pgvector
        run: python scripts/index_documents_pgvector.py --clear

      - name: Run PostgreSQL smoke check
        run: |
          if [ "${{ inputs.include_tools }}" = "true" ]; then
            python scripts/smoke_postgres.py --include-tools
          else
            python scripts/smoke_postgres.py
          fi

      - name: Run PostgreSQL integration tests
        run: python -m pytest tests/integration
