name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  default-tests:
    name: Default test suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      LANGSMITH_TRACING: "false"
      EMBEDDING_PROVIDER: "huggingface"
      WORKSHOP_MODEL: "anthropic:claude-haiku-4-5"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest httpx

      - name: Run default tests
        run: |
          python -m pytest tests/config tests/db tests/repositories tests/scripts tests/tools tests/api tests/agents tests/evaluation tests/integration

      - name: Generate V3 event artifacts
        run: python evaluation/generate_event_artifacts.py --output-dir artifacts/v3-events

      - name: Publish V3 event summary
        run: cat artifacts/v3-events/event_dashboard.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment V3 event summary on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- v3-event-summary -->';
            const dashboard = fs.readFileSync(
              'artifacts/v3-events/event_dashboard.md',
              'utf8'
            );
            const body = `${marker}\n${dashboard}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );
            const previous = comments.find((comment) =>
              comment.body?.includes(marker)
            );
            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Upload V3 event artifacts
        uses: actions/upload-artifact@v4
        with:
          name: v3-event-artifacts
          path: artifacts/v3-events
          if-no-files-found: error
